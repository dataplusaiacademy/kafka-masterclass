name: kafka-clients

x-client-env: &client-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  SCHEMA_REGISTRY_URL: http://schema-registry:8081

x-python-build: &python-build
  context: .
  dockerfile: python/Dockerfile

x-java-build: &java-build
  context: .
  dockerfile: java/Dockerfile

x-client-deps: &client-deps
  depends_on:
    kafka:
      condition: service_healthy
    init-topic:
      condition: service_completed_successfully
    schema-registry:
      condition: service_healthy

networks:
  kafka-net:
    driver: bridge

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    networks: [kafka-net]
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: kafka
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    hostname: schema-registry
    networks: [kafka-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s

  init-topic:
    image: confluentinc/cp-kafka:7.6.1
    networks: [kafka-net]
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic orders.events --partitions 3 --replication-factor 1
        echo "Topic orders.events is ready."

  python-producer:
    profiles: [clients]
    build: *python-build
    networks: [kafka-net]
    environment: *client-env
    <<: *client-deps
    command: ["python", "order_producer.py", "--orders", "3"]

  python-consumer:
    profiles: [clients]
    build: *python-build
    networks: [kafka-net]
    environment: *client-env
    <<: *client-deps
    command: ["python", "order_consumer.py"]

  java-producer:
    profiles: [clients]
    build: *java-build
    networks: [kafka-net]
    environment:
      <<: *client-env
      MAIN_CLASS: com.masterclass.kafka.OrderProducer
    <<: *client-deps

  java-consumer:
    profiles: [clients]
    build: *java-build
    networks: [kafka-net]
    environment:
      <<: *client-env
      MAIN_CLASS: com.masterclass.kafka.OrderConsumer
    <<: *client-deps

  demo-java-consumer:
    profiles: [demo]
    build: *java-build
    networks: [kafka-net]
    environment:
      <<: *client-env
      MAIN_CLASS: com.masterclass.kafka.OrderConsumer
      MAX_MESSAGES: "9"
      CONSUMER_GROUP_ID: order-fulfillment-java-demo
      AUTO_OFFSET_RESET: latest
    <<: *client-deps

  demo-python-producer:
    profiles: [demo]
    build: *python-build
    networks: [kafka-net]
    environment: *client-env
    <<: *client-deps
    command: ["sh", "-c", "sleep 8 && python order_producer.py --orders 3"]

  kafka-exporter:
    profiles: [observability]
    image: danielqsj/kafka-exporter:latest
    networks: [kafka-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka:29092

  prometheus:
    profiles: [observability]
    image: prom/prometheus:v2.51.0
    networks: [kafka-net]
    depends_on:
      - kafka-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    profiles: [observability]
    image: grafana/grafana:10.4.0
    networks: [kafka-net]
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

  control-center:
    profiles: [observability]
    image: confluentinc/cp-enterprise-control-center:7.6.1
    networks: [kafka-net]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: kafka:29092
      CONTROL_CENTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONTROL_CENTER_METRICS_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      PORT: 9021

  init-schema-compat:
    profiles: [evolve]
    image: curlimages/curl:8.7.1
    networks: [kafka-net]
    depends_on:
      schema-registry:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./monitoring/scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/init_schema_compat.sh"]

  register-schema-v2:
    profiles: [evolve]
    image: alpine:3.19
    networks: [kafka-net]
    depends_on:
      schema-registry:
        condition: service_healthy
      init-schema-compat:
        condition: service_completed_successfully
    restart: "no"
    volumes:
      - ./schemas:/schemas:ro
      - ./monitoring/scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/register_schema_v2.sh"]

  evolve-python-producer:
    profiles: [evolve]
    build: *python-build
    networks: [kafka-net]
    environment:
      <<: *client-env
      SCHEMA_PATH: /app/schemas/order_event_v2.avsc
    <<: *client-deps
    command: ["python", "order_producer.py", "--orders", "2", "--evolved"]

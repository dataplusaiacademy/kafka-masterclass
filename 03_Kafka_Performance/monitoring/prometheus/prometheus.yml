global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: kafka-broker
    static_configs:
      - targets:
          - kafka1:9404
          - kafka2:9404
          - kafka3:9404
        labels:
          env: lab

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
    metric_relabel_configs:
      - source_labels: [instance]
        target_label: hostname
        regex: "(.+)"
        replacement: "$1"
